<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ชีวะกับพี่อาร์ - Tutor Management System</title>

  <!-- Tailwind CSS -->

  <!-- React & ReactDOM -->

  <style>
    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    nav::-webkit-scrollbar { display: none; }
    nav { -ms-overflow-style: none; scrollbar-width: none; }

    /* Toggle Switch */
    .toggle-checkbox:checked { right: 0; border-color: #4f46e5; }
    .toggle-checkbox:checked + .toggle-label { background-color: #4f46e5; }

    /* Pickers */
    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      filter: invert(0.4) sepia(1) saturate(5) hue-rotate(220deg);
    }
    .animate-spin-slow { animation: spin 3s linear infinite; }

    /* Small entrance-animation utility set (used throughout via animate-in classes) */
    @keyframes fadeInKf { from { opacity: 0 } to { opacity: 1 } }
    @keyframes zoomIn95Kf { from { opacity: 0; transform: scale(.95) } to { opacity: 1; transform: scale(1) } }
    @keyframes slideFromBottom2Kf { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes slideFromBottom5Kf { from { opacity: 0; transform: translateY(24px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes slideFromTop2Kf { from { opacity: 0; transform: translateY(-10px) } to { opacity: 1; transform: translateY(0) } }
    .animate-in { animation-duration: .2s; animation-timing-function: ease-out; animation-fill-mode: both; }
    .fade-in { animation-name: fadeInKf; }
    .zoom-in-95 { animation-name: zoomIn95Kf; }
    .slide-in-from-bottom-2 { animation-name: slideFromBottom2Kf; }
    .slide-in-from-bottom-5 { animation-name: slideFromBottom5Kf; }
    .slide-in-from-top-2 { animation-name: slideFromTop2Kf; }
    .duration-200 { animation-duration: .2s; }
    .duration-300 { animation-duration: .3s; }

    /* Print Styles for Receipt, Invoice & Report */
    @media print {
      .no-print { display: none !important; }
      body, html { background-color: white !important; margin: 0 !important; padding: 0 !important; }
      .print-wrapper { position: static !important; background: transparent !important; display: block !important; padding: 0 !important; }
      .print-modal {
        position: static !important; box-shadow: none !important; max-width: 100% !important; width: 100% !important;
        max-height: none !important; height: auto !important; overflow: visible !important; border: none !important; margin: 0 !important;
      }
      #printable-receipt, #printable-report, #printable-invoice {
        overflow: visible !important; height: auto !important; max-height: none !important; padding: 20px !important;
      }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body class="bg-[#f4f7fb]">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // ================================================================
    // ⚙️  SUPABASE CONFIG — แก้ 2 บรรทัดนี้ก่อนใช้งานจริง
    // หาได้จาก Supabase Dashboard -> Project Settings -> API
    // (ดูขั้นตอนทั้งหมดในไฟล์ README.md ที่แนบมาด้วย)
    // ================================================================
    const SUPABASE_URL = "https://khmipofvlswcwjrvfibh.supabase.co

";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtobWlwb2Z2bHN3Y3dqcnZmaWJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MDIzMTEsImV4cCI6MjEwMDE3ODMxMX0.PxoXGkjsRAMnMIxmb75wl4KIqrunjI19O4DbpWf0Mzw";

    const isSupabaseConfigured =
      /^https:\/\/.+\.supabase\.co\/?$/.test(SUPABASE_URL) &&
      typeof SUPABASE_ANON_KEY === 'string' &&
      SUPABASE_ANON_KEY.length > 20 &&
      !SUPABASE_ANON_KEY.startsWith('YOUR');

    const sb = (isSupabaseConfigured && window.supabase)
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    // ================================================================
    // Helpers: แปลงชื่อคอลัมน์ snake_case (Postgres) <-> camelCase (JS)
    // ทำให้โค้ดฝั่ง React ทั้งหมดใช้ camelCase ได้เหมือนเดิม
    // ================================================================
    const snakeToCamel = (s) => s.replace(/_([a-z0-9])/g, (_, c) => c.toUpperCase());
    const camelToSnake = (s) => s.replace(/([A-Z])/g, (m) => '_' + m.toLowerCase());

    const rowToCamel = (row) => {
      if (!row) return row;
      const out = {};
      Object.keys(row).forEach(k => { out[snakeToCamel(k)] = row[k]; });
      return out;
    };
    const toSnakeFields = (obj) => {
      const out = {};
      Object.keys(obj).forEach(k => { out[camelToSnake(k)] = obj[k]; });
      return out;
    };

    // ================================================================
    // Generic DB helpers (ทุกตารางใช้ชุดฟังก์ชันเดียวกัน)
    // ================================================================
    async function dbList(table, orderCol = 'created_at', ascending = false) {
      const { data, error } = await sb.from(table).select('*').order(orderCol, { ascending });
      if (error) throw error;
      return (data || []).map(rowToCamel);
    }
    async function dbInsert(table, obj) {
      const { data, error } = await sb.from(table).insert(toSnakeFields(obj)).select().single();
      if (error) throw error;
      return rowToCamel(data);
    }
    async function dbInsertMany(table, arr) {
      const { data, error } = await sb.from(table).insert(arr.map(toSnakeFields)).select();
      if (error) throw error;
      return (data || []).map(rowToCamel);
    }
    async function dbUpdate(table, id, obj) {
      const { data, error } = await sb.from(table).update(toSnakeFields(obj)).eq('id', id).select().single();
      if (error) throw error;
      return rowToCamel(data);
    }
    async function dbDelete(table, id) {
      const { error } = await sb.from(table).delete().eq('id', id);
      if (error) throw error;
      return true;
    }
    async function dbUpsertMany(table, arr, onConflict = 'id') {
      const { data, error } = await sb.from(table).upsert(arr.map(toSnakeFields), { onConflict }).select();
      if (error) throw error;
      return (data || []).map(rowToCamel);
    }

    const DEFAULT_SETTINGS = {
      isHoliday: false, holidayReason: '', holidayStart: '', holidayReturn: '',
      promptpayId: '', driveFolderUrl: '',
      businessName: 'สถาบันกวดวิชา', businessAddress: '', businessPhone: '', businessTaxId: '',
      bankName: '', bankAccountNo: '', bankAccountName: '', signatureName: ''
    };

    // ================================================================
    // Hook: ตารางแบบ realtime — ดึงข้อมูลครั้งแรก + ซิงก์อัตโนมัติเมื่อมีการเปลี่ยนแปลง
    // (รองรับใช้งานหลายอุปกรณ์พร้อมกันโดยข้อมูลจะอัปเดตให้เองแบบ real-time)
    // ================================================================
    function useRealtimeTable(table, options) {
      const opts = options || {};
      const orderCol = opts.orderCol || 'created_at';
      const ascending = !!opts.ascending;
      const enabled = opts.enabled !== false;

      const [rows, setRows] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const reload = useCallback(async () => {
        if (!enabled) return;
        try {
          const data = await dbList(table, orderCol, ascending);
          setRows(data);
          setError(null);
        } catch (e) {
          setError(e);
        } finally {
          setLoading(false);
        }
      }, [table, orderCol, ascending, enabled]);

      useEffect(() => {
        if (!enabled) { setLoading(false); return; }
        setLoading(true);
        reload();
        const channel = sb.channel('rt-' + table + '-' + Math.random().toString(36).slice(2))
          .on('postgres_changes', { event: '*', schema: 'public', table }, (payload) => {
            setRows(prev => {
              if (payload.eventType === 'DELETE') {
                return prev.filter(r => r.id !== payload.old.id);
              }
              const incoming = rowToCamel(payload.new);
              const exists = prev.some(r => r.id === incoming.id);
              if (exists) return prev.map(r => (r.id === incoming.id ? incoming : r));
              return ascending ? [...prev, incoming] : [incoming, ...prev];
            });
          })
          .subscribe();
        return () => { sb.removeChannel(channel); };
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [table, enabled]);

      return { rows, setRows, loading, error, reload };
    }

    // ================================================================
    // Hook: การตั้งค่า (1 แถวต่อผู้ใช้ 1 คน)
    // ================================================================
    function useSettings(session) {
      const [settings, setSettings] = useState(null);
      const [loading, setLoading] = useState(true);
      const userId = session && session.user ? session.user.id : null;

      useEffect(() => {
        if (!userId) return;
        let active = true;
        (async () => {
          const { data } = await sb.from('settings').select('*').maybeSingle();
          if (!active) return;
          if (data) {
            setSettings(rowToCamel(data));
          } else {
            try {
              const { data: created, error } = await sb.from('settings').insert(toSnakeFields(DEFAULT_SETTINGS)).select().single();
              if (error) throw error;
              if (active) setSettings(rowToCamel(created));
            } catch (e) {
              if (active) setSettings(DEFAULT_SETTINGS);
            }
          }
          if (active) setLoading(false);
        })();

        const channel = sb.channel('rt-settings-' + userId)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, (payload) => {
            if (payload.eventType === 'DELETE') return;
            setSettings(rowToCamel(payload.new));
          })
          .subscribe();

        return () => { active = false; sb.removeChannel(channel); };
      }, [userId]);

      const save = useCallback(async (patch) => {
        const merged = Object.assign({}, settings || DEFAULT_SETTINGS, patch);
        const { data, error } = await sb.from('settings').upsert(toSnakeFields(merged), { onConflict: 'user_id' }).select().single();
        if (error) throw error;
        const saved = rowToCamel(data);
        setSettings(saved);
        return saved;
      }, [settings]);

      return { settings: settings || DEFAULT_SETTINGS, loading, save };
    }

    // ================================================================
    // Hook: สถานะการล็อกอิน
    // ================================================================
    function useAuth() {
      const [session, setSession] = useState(undefined); // undefined = กำลังเช็ค, null = ยังไม่ล็อกอิน
      useEffect(() => {
        if (!sb) { setSession(null); return; }
        sb.auth.getSession().then(({ data }) => setSession(data.session));
        const { data: listener } = sb.auth.onAuthStateChange((_event, sess) => setSession(sess));
        return () => listener.subscription.unsubscribe();
      }, []);
      return session;
    }

    // ================================================================
    // Hook: สถานะออนไลน์/ออฟไลน์ของเบราว์เซอร์
    // ================================================================
    function useOnlineStatus() {
      const [online, setOnline] = useState(navigator.onLine);
      useEffect(() => {
        const on = () => setOnline(true);
        const off = () => setOnline(false);
        window.addEventListener('online', on);
        window.addEventListener('offline', off);
        return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
      }, []);
      return online;
    }

    // --- Custom Icon Component ---
    const Icon = React.memo(({ name, size = 24, className = "", strokeWidth = 2 }) => {
      const iconRef = useRef(null);
      useEffect(() => {
        if (iconRef.current && window.lucide && window.lucide.icons[name]) {
          iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
          window.lucide.createIcons({
            root: iconRef.current,
            attrs: { width: size, height: size, class: className, 'stroke-width': strokeWidth }
          });
        }
      }, [name, size, className, strokeWidth]);
      return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} />;
    });

    // --- Clock Component ---
    const DateTimeDisplay = React.memo(() => {
      const [currentTime, setCurrentTime] = useState(new Date());

      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const formattedTime = currentTime.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
      const formattedDate = currentTime.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      return (
        <div className="relative z-10 flex flex-col justify-center">
          <p className="text-slate-500 font-bold text-xs sm:text-sm mb-1 sm:mb-2 uppercase tracking-wide flex items-center gap-2">
            <Icon name="Calendar" size={16} className="text-fuchsia-500" /> {formattedDate}
          </p>
          <h3 className="text-4xl sm:text-5xl lg:text-6xl font-black text-slate-800 tracking-tighter flex items-end gap-2">
            {formattedTime} <span className="text-xl sm:text-2xl font-bold text-slate-400 mb-1 sm:mb-1.5">น.</span>
          </h3>
        </div>
      );
    });

    // --- Holiday Countdown Banner ---
    const HolidayBannerWithCountdown = React.memo(({ holidayConfig }) => {
      const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0, status: 'none' });

      useEffect(() => {
        if (!holidayConfig?.isHoliday) return;
        const parseDate = (dStr) => {
          if (!dStr) return null;
          if (dStr.includes('|')) {
            const [d, t] = dStr.split('|');
            return new Date(`${d}T${t}:00`);
          }
          return new Date(`${dStr}T00:00:00`);
        };

        const start = parseDate(holidayConfig.startDate);
        const end = parseDate(holidayConfig.returnDate);

        const timer = setInterval(() => {
          const now = new Date();
          let target = null;
          let status = '';

          if (start && now < start) {
            target = start;
            status = 'upcoming';
          } else if (end && now < end) {
            target = end;
            status = 'ongoing';
          } else {
            status = 'passed';
          }

          if (target) {
            const diff = target - now;
            setTimeLeft({
              d: Math.floor(diff / (1000 * 60 * 60 * 24)),
              h: Math.floor((diff / (1000 * 60 * 60)) % 24),
              m: Math.floor((diff / 1000 / 60) % 60),
              s: Math.floor((diff / 1000) % 60),
              status
            });
          } else {
            setTimeLeft(prev => ({ ...prev, status }));
          }
        }, 1000);

        return () => clearInterval(timer);
      }, [holidayConfig]);

      if (!holidayConfig?.isHoliday || timeLeft.status === 'passed' || timeLeft.status === 'none') return null;

      const isOngoing = timeLeft.status === 'ongoing';
      const bgGradient = isOngoing
        ? "bg-gradient-to-r from-orange-500 to-rose-600 shadow-orange-500/30"
        : "bg-gradient-to-r from-indigo-500 to-violet-600 shadow-indigo-500/30";

      const title = isOngoing ? `สถาบันปิดทำการ: ${holidayConfig.reason}` : `เตรียมหยุด: ${holidayConfig.reason}`;
      const subtitle = isOngoing ? "นับถอยหลังเปิดคลาสเรียน" : "นับถอยหลังเริ่มวันหยุด";
      const targetDateStr = isOngoing ? holidayConfig.returnDate : holidayConfig.startDate;

      const TimeBox = ({ val, label }) => (
        <div className="flex flex-col items-center bg-black/20 rounded-[1rem] p-2 md:p-3 min-w-[3.5rem] md:min-w-[4.5rem] border border-white/10 backdrop-blur-md shadow-inner">
          <span className="text-2xl md:text-3xl font-black text-white leading-none">{String(val).padStart(2, '0')}</span>
          <span className="text-[9px] md:text-[10px] text-white/80 font-bold uppercase tracking-wider mt-1">{label}</span>
        </div>
      );

      return (
        <div className={`col-span-1 md:col-span-12 rounded-[2rem] p-6 lg:p-8 text-white shadow-xl flex flex-col md:flex-row items-center justify-between relative overflow-hidden ${bgGradient} transition-all duration-500`}>
          <div className="absolute right-0 top-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -translate-y-1/4 translate-x-1/4"></div>

          <div className="relative z-10 flex-1 mb-6 md:mb-0 text-center md:text-left">
            <p className="text-white/80 font-bold text-sm mb-2 uppercase tracking-wider flex items-center justify-center md:justify-start gap-2">
              <Icon name="AlertTriangle" size={16} className={isOngoing ? "animate-pulse text-orange-200" : "text-indigo-200"} />
              {isOngoing ? "ประกาศแจ้งเตือน (ขณะนี้สถาบันหยุด)" : "ประกาศล่วงหน้า (กำลังจะหยุด)"}
            </p>
            <h3 className="text-2xl md:text-4xl font-black mb-4 tracking-tight">{title}</h3>
            <p className="font-medium text-white/90 text-sm md:text-base bg-black/10 inline-block px-4 py-2.5 rounded-xl border border-white/10">
              {isOngoing ? 'จะกลับมาเปิดคลาสเรียนปกติในวันที่' : 'เริ่มงดการเรียนการสอนในวันที่'} <span className="font-bold underline underline-offset-4 ml-1">
                {formatHolidayDateStr(targetDateStr)}
              </span>
            </p>
          </div>

          <div className="relative z-10 flex flex-col items-center md:items-end bg-white/5 p-4 md:p-5 rounded-[1.5rem] border border-white/10 shadow-lg">
            <p className="text-xs font-bold text-white/90 mb-3 uppercase tracking-widest flex items-center gap-2">
               <Icon name="Timer" size={14} className="animate-spin-slow" /> {subtitle}
            </p>
            <div className="flex items-center gap-1.5 md:gap-2">
              <TimeBox val={timeLeft.d} label="วัน" />
              <span className="text-xl font-black text-white/50 pb-4 animate-pulse">:</span>
              <TimeBox val={timeLeft.h} label="ชม." />
              <span className="text-xl font-black text-white/50 pb-4 animate-pulse">:</span>
              <TimeBox val={timeLeft.m} label="นาที" />
              <span className="text-xl font-black text-white/50 pb-4 animate-pulse">:</span>
              <TimeBox val={timeLeft.s} label="วิ." />
            </div>
          </div>
          <Icon name="CalendarClock" size={160} strokeWidth={1} className="absolute -left-10 -bottom-10 z-0 opacity-10 pointer-events-none" />
        </div>
      );
    });

    const daysOfWeek = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
    const shortDayNames = {
      'อาทิตย์': 'อา', 'จันทร์': 'จ', 'อังคาร': 'อ', 'พุธ': 'พ', 'พฤหัสบดี': 'พฤ', 'ศุกร์': 'ศ', 'เสาร์': 'ส'
    };

    // --- Helpers ---
    const parseTimeToMinutes = (timeStr) => {
      if (!timeStr || !timeStr.includes(':')) return 0;
      const [h, m] = timeStr.split(':').map(Number);
      return (h * 60) + (m || 0);
    };

    const formatHolidayDateStr = (dStr) => {
      if (!dStr) return '-';
      if (dStr.includes('|')) {
        const [d, t] = dStr.split('|');
        const dateObj = new Date(d);
        if (!isNaN(dateObj)) return `${dateObj.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })} เวลา ${t} น.`;
      }
      return dStr;
    };

    const formatShortDate = (dateStr) => {
      if (!dateStr) return '-';
      try {
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr;
        return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
      } catch (e) {
        return dateStr;
      }
    };

    const formatMoneyForQR = (amount) => {
      const n = Number(amount);
      if (!isFinite(n) || n <= 0) return '0.00';
      return n.toFixed(2);
    };

    const calculateEstimatedEndDate = (student) => {
      if (!student || student.courseType === 'รายปี') return null;
      const remainingHours = parseFloat(student.hoursTotal) - (parseFloat(student.hoursUsed) || 0);
      if (remainingHours <= 0) return 'จบคอร์สแล้ว';
      if (!student.schedules || student.schedules.length === 0) return 'ไม่ระบุตารางเรียน';

      const daysMap = { 'อาทิตย์': 0, 'จันทร์': 1, 'อังคาร': 2, 'พุธ': 3, 'พฤหัสบดี': 4, 'ศุกร์': 5, 'เสาร์': 6 };
      const dailyHours = [0, 0, 0, 0, 0, 0, 0];
      let totalWeeklyHours = 0;

      student.schedules.forEach(sch => {
        if (sch.day && sch.time && sch.time.includes('-')) {
          const dayIdx = daysMap[sch.day];
          const [start, end] = sch.time.split('-');
          const startMins = parseTimeToMinutes(start);
          const endMins = parseTimeToMinutes(end);
          if (endMins > startMins) {
            const hrs = (endMins - startMins) / 60;
            if (dayIdx !== undefined) {
              dailyHours[dayIdx] += hrs;
              totalWeeklyHours += hrs;
            }
          }
        }
      });

      if (totalWeeklyHours === 0) return 'เวลาเรียนไม่ถูกต้อง';

      let simDate = new Date();
      simDate.setHours(0, 0, 0, 0);

      if (student.startDate && (parseFloat(student.hoursUsed) || 0) === 0) {
        const sDate = new Date(student.startDate);
        sDate.setHours(0, 0, 0, 0);
        if (sDate > simDate) {
          simDate = sDate;
        }
      }
      simDate.setDate(simDate.getDate() - 1);

      let h = remainingHours;
      let failsafe = 0;

      while (h > 0 && failsafe < 730) {
        simDate.setDate(simDate.getDate() + 1);
        const dayIdx = simDate.getDay();
        if (dailyHours[dayIdx] > 0) {
          h -= dailyHours[dayIdx];
        }
        failsafe++;
      }

      if (failsafe >= 730) return 'คำนวณไม่ได้';
      return simDate;
    };

    // --- CSV Parser Helper ---
    const parseCSV = (csvText) => {
      const lines = csvText.split('\n').filter(line => line.trim() !== '');
      if (lines.length < 2) return [];
      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
      const result = [];
      for (let i = 1; i < lines.length; i++) {
        const currentLine = lines[i].split(',').map(val => val.trim().replace(/^"|"$/g, ''));
        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = currentLine[index];
        });
        result.push(obj);
      }
      return result;
    };

      // --- Derived Data ---

      const totalIncome = useMemo(() => finances.filter(f => f.type === 'income').reduce((sum, item) => sum + parseFloat(item.amount), 0), [finances]);
      const totalExpense = useMemo(() => finances.filter(f => f.type === 'expense').reduce((sum, item) => sum + parseFloat(item.amount), 0), [finances]);
      const netProfit = totalIncome - totalExpense;

      const projectedIncome = useMemo(() =>
        students.filter(s => s.paymentStatus === 'ยังไม่ชำระ' || s.paymentStatus === 'ค้างชำระ')
                .reduce((sum, s) => sum + parseFloat(s.price || 0), 0)
      , [students]);

        students.filter(s => s.status === 'กำลังเรียน' && s.courseType !== 'รายปี' && (parseFloat(s.hoursTotal) - parseFloat(s.hoursUsed)) <= 3)
      , [students]);

      const chartData = useMemo(() => {
        const monthlyIncome = {};
        const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

        finances.forEach(f => {
          if (f.type === 'income') {
            const d = new Date(f.date);
            if (!isNaN(d.getTime())) {
              const mName = months[d.getMonth()];
              monthlyIncome[mName] = (monthlyIncome[mName] || 0) + parseFloat(f.amount);
            }
          }
        });

        const result = Object.keys(monthlyIncome).map(k => ({ name: k, รายได้: monthlyIncome[k] }));
        if (result.length === 0) return [{ name: 'เดือนนี้', รายได้: 0 }];
        return result;
      }, [finances]);

      const chartMax = useMemo(() => {
        const max = Math.max(...chartData.map(d => d.รายได้));
        return max === 0 ? 100 : max * 1.2;
      }, [chartData]);

      const groupedFinances = useMemo(() => {
        const groups = {};
        finances.forEach(f => {
          const date = new Date(f.date);
          if (isNaN(date)) return;
          const monthYear = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
          if (!groups[monthYear]) {
            groups[monthYear] = {
              id: monthYear,
              label: date.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' }),
              items: [],
              income: 0,
              expense: 0,
              profit: 0
            };
          }
          groups[monthYear].items.push(f);
          if (f.type === 'income') groups[monthYear].income += parseFloat(f.amount);
          else if (f.type === 'expense') groups[monthYear].expense += parseFloat(f.amount);
          groups[monthYear].profit = groups[monthYear].income - groups[monthYear].expense;
        });
        return Object.values(groups)
          .sort((a, b) => b.id.localeCompare(a.id))
          .map(group => {
            const sortedItems = [...group.items].sort((a, b) => new Date(b.date) - new Date(a.date));

          .sort((a, b) => new Date(b.date) - new Date(a.date))

      const { filteredScores, totalExams, avgPercentage, maxPercentage, performanceStatus } = useMemo(() => {
        const scores = examScores
          .filter(score => scoreFilterStudentId === '' || score.studentId.toString() === scoreFilterStudentId)

        const total = scores.length;
        const avg = total > 0 ? scores.reduce((sum, s) => sum + ((parseFloat(s.score) / (parseFloat(s.maxScore) || 1)) * 100), 0) / total : 0;

        const maxScoreObj = total > 0 ? scores.reduce((prev, current) => ((parseFloat(current.score) / (parseFloat(current.maxScore) || 1)) > (parseFloat(prev.score) / (parseFloat(prev.maxScore) || 1))) ? current : prev) : null;

      // --- Available Time Slots Calculation ---
      const availableSlots = useMemo(() => {
        const workableStart = 8 * 60;
        const workableEnd = 22 * 60;
        const slots = {};

        daysOfWeek.forEach(day => {
          const dayEvents = calendarEvents.filter(e => e.day === day);

          let busyIntervals = dayEvents.map(e => ({
            start: parseTimeToMinutes(e.startTime),
            end: parseTimeToMinutes(e.endTime)
          })).sort((a, b) => a.start - b.start);

          let mergedBusy = [];
          if (busyIntervals.length > 0) {
            let current = busyIntervals[0];
            for (let i = 1; i < busyIntervals.length; i++) {
              if (busyIntervals[i].start <= current.end) {
                current.end = Math.max(current.end, busyIntervals[i].end);
              } else {
                mergedBusy.push(current);
                current = busyIntervals[i];
              }
            }
            mergedBusy.push(current);
          }

          let freeIntervals = [];
          let currentTime = workableStart;

          mergedBusy.forEach(busy => {
            if (currentTime < busy.start) {
              freeIntervals.push({ start: currentTime, end: busy.start });
            }
            currentTime = Math.max(currentTime, busy.end);
          });

          if (currentTime < workableEnd) {
            freeIntervals.push({ start: currentTime, end: workableEnd });
          }

          slots[day] = freeIntervals.map(inv => {
            const startH = Math.floor(inv.start / 60).toString().padStart(2, '0');
            const startM = (inv.start % 60).toString().padStart(2, '0');
            const endH = Math.floor(inv.end / 60).toString().padStart(2, '0');
            const endM = (inv.end % 60).toString().padStart(2, '0');
            return `${startH}:${startM} - ${endH}:${endM}`;
          });
        });

        return slots;

          message: 'ระบบจะเพิ่ม/อัปเดตข้อมูลจากไฟล์ backup เข้าสู่ระบบปัจจุบัน โปรดตรวจสอบให้แน่ใจว่าเป็นไฟล์ backup ที่ถูกต้องก่อนดำเนินการ',
          confirmLabel: 'นำเข้าข้อมูล',
          danger: false,
          onConfirm: () => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async (evt) => {
              try {
                const payload = JSON.parse(evt.target.result);
                const tableMap = [
                  ['courses', payload.courses],
                  ['students', payload.students],
                  ['teaching_logs', payload.teachingLogs],
                  ['exam_scores', payload.examScores],
                  ['finances', payload.finances],
                  ['materials', payload.materials],
                  ['tasks', payload.tasks],
                  ['quick_replies', payload.quickReplies],
                ];
                for (const [table, rows] of tableMap) {
                  if (!Array.isArray(rows) || rows.length === 0) continue;
                  await dbUpsertMany(table, rows, 'id');
                }
                showToast('นำเข้าข้อมูลสำรองสำเร็จ กำลังรีเฟรชหน้า...');
                setTimeout(() => window.location.reload(), 1200);
                resolve();
              } catch (err) {
                reject(err);

            };
            reader.onerror = reject;
            reader.readAsText(file);

        const height = 200;

        const xStep = (width - padding * 2) / (chartData.length - 1);

          const p = (parseFloat(s.score) / (parseFloat(s.maxScore) || 1)) * 100;

                    <div className="grid grid-cols-2 gap-6 items-center bg-slate-50 rounded-2xl p-5 mb-6">
                      <div className="text-sm space-y-1">
                        <p className="font-bold text-slate-700 mb-2">ช่องทางการชำระเงิน</p>
                        {settings.bankName && (
                          <>
                            <p className="text-xs text-slate-500">ธนาคาร: <span className="font-bold text-slate-700">{settings.bankName}</span></p>
                            <p className="text-xs text-slate-500">เลขบัญชี: <span className="font-bold text-slate-700">{settings.bankAccountNo}</span></p>
                            <p className="text-xs text-slate-500">ชื่อบัญชี: <span className="font-bold text-slate-700">{settings.bankAccountName}</span></p>
                          </>
                        )}
                      </div>
                      {settings.promptpayId && (
                        <div className="text-center">
                          <img
                            src={`https://promptpay.io/${settings.promptpayId}/${formatMoneyForQR(invoiceStudent.price)}.png`}
                            alt="PromptPay QR"
                            className="w-32 h-32 mx-auto rounded-lg border border-slate-200 bg-white p-1"
                          />
                          <p className="text-[10px] text-slate-400 font-bold mt-1">สแกนจ่ายผ่านพร้อมเพย์</p>
                        </div>
                      )}
                    </div>
                  )}

                  <div className="flex justify-end">
                    <div className="text-center">
                      <p className="text-lg mb-1 italic" style={{ fontFamily: 'cursive' }}>{settings.signatureName || '.......................................'}</p>
                      <div className="w-48 border-t border-slate-400 pt-1">
                        <p className="text-xs text-slate-500">({settings.signatureName || 'ผู้ออกเอกสาร'})</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ============================== MODAL: รายงานพัฒนาการนักเรียน ============================== */}
          {reportStudent && (() => {
            const rLogs = teachingLogs.filter(l => l.studentId === reportStudent.id).sort((a, b) => new Date(b.date) - new Date(a.date));
            const rScores = examScores.filter(s => s.studentId === reportStudent.id).sort((a, b) => new Date(b.date) - new Date(a.date));
            const totalTaughtHours = rLogs.reduce((sum, l) => sum + parseFloat(l.hours || 0), 0);
            const rAvg = rScores.length > 0 ? rScores.reduce((sum, s) => sum + ((parseFloat(s.score) / (parseFloat(s.maxScore) || 1)) * 100), 0) / rScores.length : 0;

            return (
              <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-[95] print-wrapper">
                <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl animate-in fade-in zoom-in-95 duration-200 max-h-[92vh] flex flex-col print-modal">
                  <div className="flex items-center justify-between p-5 border-b border-slate-100 no-print shrink-0">
                    <h3 className="text-lg font-black text-slate-800">รายงานพัฒนาการ</h3>
                    <div className="flex items-center gap-2">
                      <button onClick={() => window.print()} className="px-4 py-2 bg-indigo-600 text-white rounded-full text-xs font-bold flex items-center gap-1.5 hover:bg-indigo-700 transition-colors">
                        <Icon name="Printer" size={14} /> พิมพ์ / บันทึก PDF
                      </button>
                      <button onClick={() => setReportStudent(null)} className="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-full transition-colors">
                        <Icon name="X" size={18} />
                      </button>
                    </div>
                  </div>

                  <div id="printable-report" className="p-8 overflow-y-auto custom-scrollbar text-slate-800">
                    <div className="flex items-start justify-between mb-8 pb-6 border-b-2 border-slate-800">
                      <div>
                        <h2 className="text-xl font-black">{settings.businessName}</h2>
                        <p className="text-xs text-slate-500 mt-1">รายงานพัฒนาการการเรียน</p>
                      </div>
                      <div className="text-right">
                        <h3 className="text-lg font-black text-indigo-600">{reportStudent.name}</h3>
                        <p className="text-xs text-slate-400 font-bold">ออกรายงานวันที่ {formatShortDate(new Date().toISOString())}</p>
                      </div>
                    </div>

                    <div className="grid grid-cols-3 gap-4 mb-8">
                      <div className="bg-slate-50 rounded-xl p-4 text-center">
                        <p className="text-2xl font-black text-slate-800">{totalTaughtHours}</p>
                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">ชั่วโมงสอนสะสม</p>
                      </div>
                      <div className="bg-slate-50 rounded-xl p-4 text-center">
                        <p className="text-2xl font-black text-slate-800">{rLogs.length}</p>
                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">จำนวนคาบเรียน</p>
                      </div>
                      <div className="bg-indigo-50 rounded-xl p-4 text-center">
                        <p className="text-2xl font-black text-indigo-600">{rScores.length > 0 ? rAvg.toFixed(0) + '%' : '-'}</p>
                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">คะแนนเฉลี่ย</p>
                      </div>
                    </div>

                    {renderChart(rScores)}

                    <div className="mb-8">
                      <h4 className="text-sm font-bold text-indigo-800 mb-3 flex items-center gap-2"><Icon name="BookOpen" size={16} /> สรุปการเรียนล่าสุด</h4>
                      <div className="space-y-2">
                        {rLogs.length === 0 ? <p className="text-sm text-slate-400">ยังไม่มีบันทึกการสอน</p> : rLogs.slice(0, 8).map(log => (
                          <div key={log.id} className="flex items-start justify-between text-sm border-b border-slate-100 pb-2">
                            <div>
                              <p className="font-bold text-slate-700">{log.topic}</p>
                              {log.notes && <p className="text-xs text-slate-400 italic">{log.notes}</p>}
                            </div>
                            <span className="text-xs text-slate-400 font-bold whitespace-nowrap ml-3">{formatShortDate(log.date)}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="mb-10">
                      <h4 className="text-sm font-bold text-indigo-800 mb-3 flex items-center gap-2"><Icon name="Award" size={16} /> ประวัติคะแนนสอบ</h4>
                      <div className="space-y-2">
                        {rScores.length === 0 ? <p className="text-sm text-slate-400">ยังไม่มีข้อมูลคะแนนสอบ</p> : rScores.slice(0, 8).map(score => (
                          <div key={score.id} className="flex items-center justify-between text-sm border-b border-slate-100 pb-2">
                            <span className="font-bold text-slate-700">{score.examType} — {score.topic}</span>
                            <span className="font-black text-slate-800">{score.score}/{score.maxScore}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="flex justify-end">
                      <div className="text-center">
                        <p className="text-lg mb-1 italic" style={{ fontFamily: 'cursive' }}>{settings.signatureName || '.......................................'}</p>
                        <div className="w-48 border-t border-slate-400 pt-1">
                          <p className="text-xs text-slate-500">({settings.signatureName || 'ผู้สอน'})</p>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* ============================== MODAL: แชร์ตารางเรียน ============================== */}
          {shareModal && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-[90] no-print">
              <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md p-6 md:p-8 animate-in fade-in zoom-in-95 duration-200">
                <div className="flex items-center justify-between mb-6">
                  <h3 className="text-xl font-black text-slate-800">แชร์ตารางเรียน</h3>
                  <button onClick={() => setShareModal(null)} className="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-full transition-colors">
                    <Icon name="X" size={20} />
                  </button>
                </div>

                {shareModal.type === 'กลุ่ม' && shareModal.members && shareModal.members.length > 0 ? (
                  <div className="space-y-4">
                    <p className="text-sm text-slate-500">เลือกสมาชิกที่ต้องการส่งตารางเรียนให้ หรือส่งภาพรวมทั้งกลุ่ม</p>
                    <div className="flex flex-wrap gap-2">
                      <button
                        onClick={() => setShareSelectedMember(null)}
                        className={`px-3.5 py-2 rounded-full text-xs font-bold border transition-colors ${!shareSelectedMember ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-slate-50 text-slate-600 border-slate-200'}`}
                      >
                        ทั้งกลุ่ม
                      </button>
                      {shareModal.members.map((m, i) => (
                        <button
                          key={i}
                          onClick={() => setShareSelectedMember(m)}
                          className={`px-3.5 py-2 rounded-full text-xs font-bold border transition-colors ${shareSelectedMember === m ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-slate-50 text-slate-600 border-slate-200'}`}
                        >
                          {m}
                        </button>
                      ))}
                    </div>
                    <button
                      onClick={() => { copyScheduleSummary(shareModal, shareSelectedMember); setShareModal(null); }}
                      className="w-full py-3.5 bg-indigo-600 text-white rounded-xl font-bold shadow-md shadow-indigo-600/20 hover:bg-indigo-700 transition-all flex items-center justify-center gap-2"
                    >
                      <Icon name="Copy" size={16} /> คัดลอกข้อความตาราง
                    </button>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <p className="text-sm text-slate-500">คัดลอกข้อความตารางเรียนของ {shareModal.name} เพื่อนำไปส่งใน LINE</p>
                    <button
                      onClick={() => { copyScheduleSummary(shareModal); setShareModal(null); }}
                      className="w-full py-3.5 bg-indigo-600 text-white rounded-xl font-bold shadow-md shadow-indigo-600/20 hover:bg-indigo-700 transition-all flex items-center justify-center gap-2"
                    >
                      <Icon name="Copy" size={16} /> คัดลอกข้อความตาราง
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

        </div>
      );
    }

    // ================================================================
    // Root: ตัดสินใจว่าจะแสดงหน้าไหน (ตั้งค่า / ล็อกอิน / แอปหลัก)
    // ================================================================
    function Root() {
      if (!isSupabaseConfigured) return <SetupNotice />;
      const session = useAuth();
      if (session === undefined) return <SplashScreen label="กำลังตรวจสอบสถานะเข้าสู่ระบบ..." />;
      if (!session) return <LoginScreen />;
      return <BioTutorApp session={session} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><Root /></ErrorBoundary>);
  </script>
</body>
</html>
